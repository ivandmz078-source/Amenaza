<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confesión o CABUM 💣</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="franja arriba"></div>
<div class="franja abajo"></div>

<div class="wrap" id="wrap">

  <section class="pantalla" id="pantalla-cuenta">
    <p class="eyebrow">⚠ Confesión requerida</p>
    <h1 class="titulo">Me vas a contar…<br>o si no, <span class="resalte">¡CABUM!</span> 💣</h1>

    <div class="bomba" id="bomba">
      <div class="mecha"></div>
      <span class="llama">🔥</span>
      <div class="pantalla-digital">
        <span class="numero" id="numero">5</span>
      </div>
    </div>

    <p class="caption">segundos para confesar…</p>
  </section>

  <section class="pantalla oculto" id="pantalla-explosion">
    <div class="flash"></div>
    <div class="estallido-caja">
      <div class="estallido"></div>
      <h1 class="texto-boom">¡CABUM!</h1>
    </div>
  </section>

  <section class="pantalla oculto" id="pantalla-confesion">
    <p class="emoji-grande">😅</p>
    <h1 class="titulo">Bueno ya…<br>¡me cuentas porfa!</h1>
    <button class="btn-reinicio" id="btn-reinicio">Otra vez</button>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
